name: (Tests) Unit + Integration
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-project: [
          "src/tests/app.unit/HWGA.Tests.Unit.csproj",
          "src/tests/app.integration/HWGA.Tests.Integration.csproj",
          "src/tests/tools.unit/ReadmeUpdater.Unit.csproj",
          "src/tests/tools.integration/ReadmeUpdater.Integration.csproj"
        ]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/HWGA.slnx

      - name: Run Tests with Coverage
        # /p:CollectCoverage=true включает сбор метрик
        # /p:CoverletOutputFormat=cobertura генерирует стандартный формат отчета
        run: |
          dotnet test ${{ matrix.test-project }} \
          --configuration Release --no-restore \
          /p:CollectCoverage=true \
          /p:ExcludeByFile="**/Migrations/*.cs" \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=./TestResults/

      # Загружаем "сырые" результаты как артефакты (временно)
      - name: Upload Raw Coverage
        uses: actions/upload-artifact@v4
        with:
          name: raw-coverage-${{ strategy.job-index }}
          path: "**/TestResults/coverage.cobertura.xml"

  publish-report:
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download all coverage
        uses: actions/download-artifact@v4
        with:
          path: coverage-results

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate HTML Report
        run: |
          reportgenerator \
            -reports:"coverage-results/**/*.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html;Badges"

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: final-coverage-report
          path: coveragereport

      - name: Update Coverage Badge in README
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p .github/assets
          cp coveragereport/badge_linecoverage.svg .github/assets/coverage_badge.svg
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/assets/coverage_badge.svg
          git pull
          git commit -m "Automated: Update coverage badge" || exit 0
          git push
