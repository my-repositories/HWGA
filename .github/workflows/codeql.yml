name: "CodeQL SecurityScan"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Раз в неделю по понедельникам

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: Build
        run: dotnet build src/HWGA.slnx
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
