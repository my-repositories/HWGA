services:
    hwgadb:
        image: postgres:16-alpine
        hostname: hwgadb
        container_name: hwgadb
        labels:
            - SERVICE_NAME=hwgadb
        environment:
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASS}
        expose:
            - 5432
        ports:
            - 5432:5432
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
          interval: 5s
          timeout: 5s
          retries: 5
        volumes:
            - ./pg_data:/var/lib/postgresql/data

    hwgadbpga:
        image: dpage/pgadmin4
        depends_on:
          hwgadb:
            condition: service_healthy
        hostname: hwgadbpga
        container_name: hwgadbpga
        labels:
            - SERVICE_NAME=hwgadbpga
        restart: always
        environment:
            - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
            - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASS}
        ports:
            - "5050:80"
        volumes:
            - ./servers.json:/pgadmin4/servers.json


volumes:
    postgres:
